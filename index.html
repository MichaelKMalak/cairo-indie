    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" as="style" />
    
    <!-- Font declarations (corrected) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gunterz:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap">
    
    <!-- Backup inline font-face for mobile -->
    <style>
      /* Backup @font-face declaration for mobile devices */
      @font-face {
        font-family: 'Montserrat';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/montserrat/v25/JTUHjIg1_i6t8kCHKm4532VJOt5-QNFgpCtr6Hw5aXo.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      /* Ensure text is visible during font loading */
      html { font-display: swap; }
    </style>
    
    <!-- Enhanced font loading diagnostic script -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // More comprehensive font loading check
        setTimeout(function() {
          document.fonts.ready.then(function() {
            if (document.fonts.check('1em Montserrat')) {
              console.log('Montserrat font loaded successfully');
              document.documentElement.classList.add('montserrat-loaded');
            } else {
              console.warn('Montserrat font not loaded, applying fallbacks');
              document.documentElement.classList.add('montserrat-failed');
              // Force apply system fallback
              document.body.style.fontFamily = 
                "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif";
            }
            
            // Check for mobile specifically
            if (window.innerWidth < 768) {
              console.log('Mobile device detected, applying mobile-specific font fixes');
            }
          });
        }, 500); // Small delay to ensure fonts have a chance to load
      });
    </script>
