    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/gunterz">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap&display=swap">
    
    <!-- Font loading diagnostic script -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        // Check if Montserrat font is loaded
        document.fonts.ready.then(function() {
          if (document.fonts.check('1em Montserrat')) {
            console.log('Montserrat font loaded successfully');
          } else {
            console.warn('Montserrat font not loaded');
          }
          
          // Check if Gunterz font is loaded
          if (document.fonts.check('1em Gunterz')) {
            console.log('Gunterz font loaded successfully');
          } else {
            console.warn('Gunterz font not loaded');
          }
        });
      });
    </script>
